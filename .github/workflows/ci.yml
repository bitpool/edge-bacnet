name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Syntax + module load
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # node --check on every committed JS file. Catches the trivial breakage
      # class (typos, unmatched braces) that has no other guard in this repo.
      - name: Syntax check
        run: |
          set -euo pipefail
          # Exclude node_modules and the vendored bacstack dist (precompiled).
          mapfile -t files < <(git ls-files '*.js' \
            | grep -v '^node_modules/' \
            | grep -v '^resources/node-bacstack-ts/dist/')
          echo "checking ${#files[@]} files"
          for f in "${files[@]}"; do node --check "$f"; done

      - name: Smoke (require-safe modules)
        run: npm run test:unit

  integration:
    name: BACnet readProperty against bacnet-sim-ci
    runs-on: ubuntu-latest
    needs: smoke
    # The sim's own blessed pattern (see action.yml + examples/ in
    # rise-building-technology/bacnet-sim-ci) is to start the container with
    # `docker run` and address it on localhost via port-forwarding. Using GH
    # Actions `services:` instead puts the sim on a custom user-defined
    # network and BACnet UDP didn't make the round-trip in two prior
    # iterations on this branch — falling back to the documented path.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Start BACnet simulator
        uses: rise-building-technology/bacnet-sim-ci@v1
        with:
          device-id: "1001"
          device-name: "TestDevice"
          network-profile: "local-network"

      - name: Confirm sim devices are visible
        run: curl -s http://localhost:8099/api/devices | python3 -m json.tool

      # Port 47808 on the runner host is bound to docker-proxy by the sim's
      # port mapping, so the test client binds to 47809 instead. The sim
      # accepts requests from any source port.
      - name: Run integration test
        env:
          SIM_API_URL: http://localhost:8099
          SIM_BACNET_PORT: "47808"
          LOCAL_BACNET_PORT: "47809"
        run: npm run test:integration

      - name: Sim logs (on failure)
        if: failure()
        run: docker logs bacnet-sim 2>&1 | tail -200 || true
